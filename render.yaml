databases:
  - name: sitetrack-db
    plan: free
    databaseName: sitetrack
    user: sitetrack

services:
  - type: web
    name: sitetrack-api
    env: node
    plan: free
    region: oregon
    buildCommand: npm install -g pnpm@10 && pnpm install && pnpm --filter @workspace/api-server run build && node scripts/render-migrate.mjs
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: sitetrack-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: PORT
        value: 10000
